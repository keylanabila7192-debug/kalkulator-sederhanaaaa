<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title> </title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#00b4db,#0083b0);
    }

    .calculator{
      width:340px;
      background:white;
      padding:20px;
      border-radius:25px;
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
    }

    .title{
      text-align:center;
      font-size:26px;
      font-weight:bold;
      color:#0083b0;
      margin-bottom:15px;
      letter-spacing:2px;
    }

    .display{
      width:100%;
      height:75px;
      border:none;
      border-radius:20px;
      margin-bottom:15px;
      padding:15px;
      text-align:right;
      font-size:32px;
      background:#e0f7ff;
      color:#0083b0;
      font-weight:bold;
    }

    .buttons{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
    }

    button{
      height:65px;
      border:none;
      border-radius:18px;
      font-size:22px;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      transform:scale(1.05);
    }

    .number{
      background:#f0fbff;
      color:#0083b0;
    }

    .operator{
      background:#00b4db;
      color:white;
    }

    .clear{
      background:#ff3d57;
      color:white;
    }

    .equal{
      background:#00c853;
      color:white;
      grid-column:span 2;
    }

  </style>
</head>
<body>

  <div class="calculator">

    <div class="title"> </div>

    <input type="text" id="display" class="display" value="0" readonly>

    <div class="buttons">

      <button class="clear" onclick="clearDisplay()">C</button>
      <button class="operator" onclick="plusMinus()">±</button>
      <button class="operator" onclick="percent()">%</button>
      <button class="operator" onclick="append('/')">÷</button>

      <button class="number" onclick="append('7')">7</button>
      <button class="number" onclick="append('8')">8</button>
      <button class="number" onclick="append('9')">9</button>
      <button class="operator" onclick="append('*')">×</button>

      <button class="number" onclick="append('4')">4</button>
      <button class="number" onclick="append('5')">5</button>
      <button class="number" onclick="append('6')">6</button>
      <button class="operator" onclick="append('-')">−</button>

      <button class="number" onclick="append('1')">1</button>
      <button class="number" onclick="append('2')">2</button>
      <button class="number" onclick="append('3')">3</button>
      <button class="operator" onclick="append('+')">+</button>

      <button class="number" onclick="append('0')">0</button>
      <button class="number" onclick="append('.')">.</button>

      <button class="equal" onclick="calculate()">=</button>

    </div>

  </div>

  <script>

    let display = document.getElementById("display");

    function append(value){

      if(display.value === "0" || display.value === "Error"){
        display.value = value;
      }

      else{
        display.value += value;
      }
    }

    function clearDisplay(){
      display.value = "0";
    }

    function calculate(){

      try{
        display.value = eval(display.value);
      }

      catch{
        display.value = "Error";
      }
    }

    function plusMinus(){

      try{
        display.value = eval(display.value) * -1;
      }

      catch{
        display.value = "Error";
      }
    }

    function percent(){

      try{
        display.value = eval(display.value) / 100;
      }

      catch{
        display.value = "Error";
      }
    }

  </script>

</body>
</html>
